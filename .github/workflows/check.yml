name: Check on PR
on:
  push:
    branches:
      - 'main'
  pull_request:
    types: [ opened, reopened ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v6

      - name: 'Setup JDK 21'
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: 'Run detekt'
        shell: bash
        run: |
          ./gradlew --no-daemon --stacktrace :kboy-lib:detekt :kboy-lib:detektAndroidMain :kboy-lib:detektJvmMain :kboy-lib:detektJvmTest :kboy-lib:detektIosArm64Main :kboy-lib:detektIosArm64Test :kboy-lib:detektWasmJsMain :kboy-lib:detektWasmJsTest

      - name: 'Run tests'
        shell: bash
        run: |
          ./gradlew --no-daemon --stacktrace :kboy-lib:jvmTest
